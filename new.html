<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הצייד עליאקספרס - הצטרפות לקבוצת הוואטסאפ</title>

    <!-- Facebook Pixel Code (הדבק את הקוד שלך כאן) -->
    <!-- End Facebook Pixel Code -->

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f5f7;
            color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .card {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            padding: 28px 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border: 1px solid #eaeaea;
        }

        .badge {
            background-color: #ffeae6;
            color: #ff4747;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 6px 14px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.25;
            margin-bottom: 12px;
            color: #111;
        }

        h1 span {
            color: #ff4747;
        }

        p.subtitle {
            font-size: 1rem;
            color: #555;
            line-height: 1.4;
            margin-bottom: 22px;
        }

        .features {
            text-align: right;
            background: #fafafa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
        }

        .feature-item {
            font-size: 0.95rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .feature-item:last-child {
            margin-bottom: 0;
        }

        /* כפתור ירוק בסגנון וואטסאפ */
        .btn-cta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: 700;
            text-decoration: none;
            padding: 16px 0;
            border-radius: 14px;
            box-shadow: 0 6px 18px rgba(37, 211, 102, 0.35);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-cta:active {
            transform: scale(0.98);
        }

        .micro-copy {
            font-size: 0.8rem;
            color: #888;
            margin-top: 12px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="badge">🔥 המעקב אחרי הדילים מתחיל כאן</div>
        
        <h1>הצייד <span>עליאקספרס</span></h1>
        
        <p class="subtitle">תפסיקו לשלם ביוקר. הצייד מוצא עבורכם את ירידות המחיר והקופונים הנסתרים לפני כולם.</p>

        <div class="features">
            <div class="feature-item">⚡ קופונים בלעדיים וטעויות מחיר</div>
            <div class="feature-item">📦 קישורים ישירים למוצרים מומלצים בלבד</div>
            <div class="feature-item">🎯 100% חינם, בלי חפירות ובלי ספאם</div>
        </div>

        <!-- קישור ישיר לקבוצת הוואטסאפ -->
        <a href="https://chat.whatsapp.com/HjEfcKZZgTA3Guz7RZ6qeq" class="btn-cta">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981z"/>
            </svg>
            הצטרפות מהירה לקבוצה
        </a>

        <div class="micro-copy">מעבר מיידי לאפליקציית WhatsApp</div>
    </div>

</body>
</html>
