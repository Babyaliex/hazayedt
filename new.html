<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הצייד עליאקספרס - קבוצת הדילים של ישראל</title>

    <!-- Facebook Pixel Code (הדבק את הקוד שלך כאן) -->
    <!-- End Facebook Pixel Code -->

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        }

        body {
            background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px 16px;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .promo-tag {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #fbbf24;
            margin-bottom: 24px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        h1 {
            font-size: 2.3rem;
            font-weight: 900;
            line-height: 1.15;
            letter-spacing: -0.5px;
            margin-bottom: 16px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        h1 span {
            background: linear-gradient(90deg, #ff7e5f, #feb47b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #cbd5e1;
            line-height: 1.5;
            margin-bottom: 28px;
            font-weight: 400;
        }

        .benefit-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 28px;
            text-align: right;
        }

        .benefit-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            color: #f1f5f9;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .benefit-item:last-child {
            margin-bottom: 0;
        }

        .benefit-icon {
            background: #22c55e;
            color: #fff;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .btn-whatsapp {
            width: 100%;
            background: #25d366;
            color: #ffffff;
            font-size: 1.3rem;
            font-weight: 800;
            text-decoration: none;
            padding: 18px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4), inset 0 2px 2px rgba(255,255,255,0.3);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-whatsapp:active {
            transform: scale(0.97);
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .social-proof {
            margin-top: 18px;
            font-size: 0.85rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #22c55e;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="promo-tag">
            <span>🏷️</span> קהילת השופינג של ישראל
        </div>

        <h1>הצייד <span>עליאקספרס</span></h1>

        <p class="subtitle">
            מפסיקים לשלם מחיר מלא. מקבלים התראות בזמן אמת על ירידות מחיר, קופונים שווים וטעויות תמחור נדירות.
        </p>

        <div class="benefit-box">
            <div class="benefit-item">
                <span class="benefit-icon">✓</span>
                <span>קופונים סודיים לפני כולם</span>
            </div>
            <div class="benefit-item">
                <span class="benefit-icon">✓</span>
                <span>דילים מאומתים עם המלצות גולשים</span>
            </div>
            <div class="benefit-item">
                <span class="benefit-icon">✓</span>
                <span>100% חינם ושקט - בלי חפירות</span>
            </div>
        </div>

        <a href="https://chat.whatsapp.com/HjEfcKZZgTA3Guz7RZ6qeq" class="btn-whatsapp">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
                <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981z"/>
            </svg>
            הצטרפות מהירה בוואטסאפ
        </a>

        <div class="social-proof">
            <span class="live-dot"></span>
            קבוצה פעילה • הצטרפות בלחיצה אחת
        </div>

    </div>

</body>
</html>
